workflows:
  ios-release:
    name: Preply iOS — App Store
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials   # APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY, CERTIFICATE_PRIVATE_KEY
        - preply_secrets          # your app env vars (see Step 5)
      node: v20.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: npm install

      - name: Create iOS project if it doesn't exist
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor plugins to iOS
        script: npx cap sync ios

      - name: Set up keychain and code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - domgbp21@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true   # change to false if you want to approve manually first
        submit_to_app_store: false   # set true when you're ready for full release
