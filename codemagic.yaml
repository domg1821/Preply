workflows:
  ios-release:
    name: Preply iOS — App Store
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
        - preply_secrets
      vars:
        BUILD_NUMBER: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Prepare Node 22
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          # Use any already-installed v22; only download if none present
          nvm use 22 2>/dev/null || nvm install 22
          nvm alias default 22
          echo "source $NVM_DIR/nvm.sh && nvm use 22 >/dev/null 2>&1" > ~/.node_env
          node --version

      - name: Install Node dependencies
        script: |
          source ~/.node_env
          npm install
          npm install -g @capacitor/cli @capacitor/assets

      - name: Create iOS project if it doesn't exist
        script: |
          source ~/.node_env
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor plugins to iOS
        script: |
          source ~/.node_env
          npx cap sync ios

      - name: Generate app icons
        script: |
          source ~/.node_env
          npx @capacitor/assets generate --ios \
            --iconBackgroundColor '#10B981' \
            --iconBackgroundColorDark '#10B981' \
            --splashBackgroundColor '#0E1117' \
            --splashBackgroundColorDark '#0E1117'

      - name: Set up keychain and code signing
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" > /tmp/distribution_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Set build number and export compliance
        script: |
          echo "Setting build number to $BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/App/App/Info.plist
          # Declare no non-exempt encryption (uses only standard HTTPS)
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/App/App/Info.plist

      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - domgbp21@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
