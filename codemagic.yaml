workflows:
  ios-release:
    name: Preply iOS — App Store
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
        - preply_secrets
      node: v22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          npm install
          npm install -g @capacitor/cli

      - name: Create iOS project if it doesn't exist
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor plugins to iOS
        script: npx cap sync ios

      - name: Set up keychain and code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: List provisioning profiles
        script: |
          echo "=== Profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles folder"
          echo "=== Identities ==="
          security find-identity -v -p codesigning

      - name: Build .ipa
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | grep -v "xcodeproj" | head -1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcworkspace" | head -1)
          fi
          echo "Using workspace: $WORKSPACE"

          # Get the provisioning profile UUID from the downloaded profile
          PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision 2>/dev/null | head -1)
          echo "Profile path: $PROFILE_PATH"
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" 2>/dev/null | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme App \
            -config Release \
            -archivePath build/ios/xcarchive/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            2>&1 | tail -30

          xcodebuild \
            -exportArchive \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -exportOptionsPlist /dev/stdin \
            -exportPath build/ios/ipa \
            <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>$PROFILE_UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - domgbp21@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
