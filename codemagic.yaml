workflows:
  ios-release:
    name: Preply iOS — App Store
    max_build_duration: 60
    environment:
      groups:
        - app_store_credentials
        - preply_secrets
      node: v22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Node dependencies
        script: |
          npm install
          npm install -g @capacitor/cli

      - name: Create iOS project if it doesn't exist
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor plugins to iOS
        script: npx cap sync ios

      - name: Set up keychain and code signing
        script: |
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" > /tmp/distribution_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build .ipa
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App \
            --config Release

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - domgbp21@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
